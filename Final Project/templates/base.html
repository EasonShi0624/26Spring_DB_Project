<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ pageTitle or "Last Resort Hotel" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">CSCI-UA 60 Final Project</p>
        <h1>Last Resort Hotel</h1>
        <p class="subheading">SQLite + Flask dashboard built in the same workflow as the course bookstore examples.</p>
      </div>

      <nav>
        <a class="{% if request.path == '/' %}selectedNav{% endif %}" href="{{ url_for('home') }}">Dashboard</a>
        <a class="{% if request.path == '/billing' %}selectedNav{% endif %}" href="{{ url_for('billing') }}">Billing</a>
      </nav>
    </header>

    <main>
      {% block container %}{% endblock %}
    </main>

    <footer>
      <p>Snapshot date used for the demo: {{ snapshotDate }}</p>
      <p>Milestone 2 schema expanded to a quarter of sample data.</p>
    </footer>
  </body>
</html>
